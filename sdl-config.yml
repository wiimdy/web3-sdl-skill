project:
  chain: base
  tvl_usd: null

mode:
  default: diff-sdl
  allow_stage_selection: true

diff_scope:
  base_ref: origin/main
  range: ""
  commit_window: 20
  gitlog_mode: first-parent
  diff_context_lines: 3

runtime_validation:
  enabled: true
  rpc_url_env: RPC_URL
  fork_block: null
  max_staleness_sec: 3600
  prompt_for_rpc_if_missing: true
  rpc_chain_prompt_required: true
  allow_user_decline_runtime_checks: false
  block_on_missing_rpc_for_required_checks: true

risk_scoring:
  impact_map: {Critical: 4, High: 3, Medium: 2, Low: 1}
  likelihood_map: {High: 3, Medium: 2, Low: 1}

testing:
  require_integration: true
  require_fuzz: true
  require_invariants: true
  allow_skip: false

coverage_gates:
  enabled: true
  line_min: 0.90
  branch_min: 0.80
  function_min: 1.00

gating:
  block_on_new_critical_without_reduce: true
  block_on_critical_high_invariant_failure: true
  block_on_unresolved_high_severity_semantic: true

fp_control:
  second_pass_required: true
  min_disconfirming_checks_per_high_or_critical: 2
  block_on_missing_second_pass: true
  block_on_unmapped_changed_state_function: true

semantic_validation:
  oracle_semantic_correctness_required: true
  require_denomination_trace: true
  require_validate_gap_analysis: true
  block_on_unknown_oracle_denomination: true
  max_relative_drift: 0.05

integration_validation:
  require_outcome_based_checks: true
  require_economic_scenario_tests_for_value_surfaces: true
  require_validator_negative_tests: true
  require_pre_post_diff_result_comparison: true
  max_allowed_relative_drift: 0.05

skip_policy:
  enforce_tier3_without_rpc: true
  tier3_required_checks:
    - oracle_name_pattern_blacklist
    - config_key_denomination_inference
    - validate_gap_analysis
    - slither_blind_spot_review

external_enrichment:
  enable_subagent_pass: true
  use_solidity_auditor: false
  candidate_keywords:
    - oracle
    - rounding
    - shares
    - liquidation
    - reentrancy
    - upgrade
    - role
    - permit

reporting:
  output_root: sdl-output
  include_commit_timeline: true
  include_stride_web3_table: true
  render_pdf: true
  pdf_tool: pandoc
  pdf_engine: ""
  pdf_fallback: plaintext

# Example:
# For a repository that mainly reviews PRs, keep `default: diff-sdl` and
# `allow_skip: false` so every change-focused run produces executable evidence.
# Turn on `use_solidity_auditor` only after the companion tool is installed in
# Claude Code.
# Set the runtime, semantic, and false-positive sections when you want the same
# rigor as the older monolithic SDL skill.
# Keep `block_on_missing_rpc_for_required_checks: true` when diff-driven runs
# must not silently downgrade required proposal or integration checks.
# Example RPC env for Base mainnet:
# export BASE_RPC_URL="https://base-mainnet.g.alchemy.com/v2/<alchemy-api-key>"
# Then set `runtime_validation.rpc_url_env: BASE_RPC_URL` when that is the env
# name used by the repository or local shell.
# Set `pdf_engine` when the environment needs an explicit Pandoc PDF backend.
# Keep `pdf_fallback: plaintext` when you want a deterministic backup PDF even
# if the LaTeX toolchain is incomplete.
