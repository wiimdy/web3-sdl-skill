name: Web3 SDL Check

on:
  pull_request:
    paths:
      - 'src/**/*.sol'
      - 'contracts/**/*.sol'

permissions:
  contents: read
  pull-requests: write

jobs:
  sdl-analysis:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Foundry
        uses: foundry-rs/foundry-toolchain@v1

      - name: Install Slither
        run: pip install slither-analyzer

      - name: Build contracts
        run: forge build

      - name: Run SDL Skill
        uses: anthropics/claude-code-action@v1
        with:
          prompt: |
            Run the Web3 SDL skill on the changed Solidity files in this PR.

            Execute all 4 stages:
            1. Threat Modeling — identify threats in changed contracts
            2. Risk Assessment — score and prioritize threats
            3. Testing & Verification — generate invariants and test specs
            4. Audit Preparation — compile summary

            Post the results as a PR comment with:
            - Summary of identified threats (Critical/High/Medium/Low counts)
            - New invariants that should be added
            - Recommended actions before merge
          allowed_tools: "Bash,Read,Write,Glob,Grep"

      - name: Upload SDL Output
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: sdl-output
          path: sdl-output/
